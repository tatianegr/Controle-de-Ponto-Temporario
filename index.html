<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width,initial-scale=1,viewport-fit=cover"
/>

<title>Ponto Mobile</title>

<meta name="theme-color" content="#020617"/>

<link rel="manifest" href="manifest.json"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

:root{

  --bg:#020617;
  --card:#0f172a;
  --soft:#111827;

  --border:#1e293b;

  --primary:#38bdf8;

  --text:#f8fafc;
  --muted:#94a3b8;

  --success:#10b981;

}

body{

  background:var(--bg);

  color:var(--text);

  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "SF Pro Display",
  "Segoe UI",
  sans-serif;

  min-height:100vh;

  padding-bottom:120px;

}

header{

  position:sticky;
  top:0;
  z-index:999;

  background:rgba(2,6,23,.92);

  backdrop-filter:blur(18px);

  border-bottom:1px solid var(--border);

  padding:
  calc(env(safe-area-inset-top) + 18px)
  20px
  18px;

}

header h1{

  font-size:34px;

  font-weight:900;

  color:var(--primary);

}

header p{

  margin-top:8px;

  color:var(--muted);

  font-size:15px;

}

.container{

  width:100%;

  max-width:650px;

  margin:auto;

  padding:18px;

}

.day-navigation{

  display:flex;

  align-items:center;

  justify-content:space-between;

  gap:14px;

  margin-bottom:20px;

}

.day-navigation button{

  width:52px;
  height:52px;

  border:none;

  border-radius:18px;

  background:#1e293b;

  color:white;

  font-size:22px;

  font-weight:900;

}

#currentDate{

  flex:1;

  text-align:center;

  font-size:24px;

  font-weight:900;

  color:#38bdf8;

}

.day-card{

  background:var(--card);

  border:1px solid var(--border);

  border-radius:30px;

  padding:22px;

}

.work-timer{

  background:#020617;

  border:2px solid #1e293b;

  border-radius:24px;

  padding:22px;

  margin-bottom:24px;

  text-align:center;

}

.timer-title{

  color:#94a3b8;

  font-size:14px;

  margin-bottom:10px;

}

.timer-value{

  font-size:42px;

  font-weight:900;

  color:#38bdf8;

  letter-spacing:2px;

}

.timer-remaining{

  margin-top:10px;

  color:#10b981;

  font-size:14px;

}

.point-card{

  background:var(--soft);

  border:1px solid var(--border);

  border-radius:24px;

  padding:18px;

  margin-bottom:18px;

}

.point-label{

  color:var(--muted);

  margin-bottom:12px;

  font-size:15px;

}

.time-input{

  width:100%;

  height:64px;

  appearance:none;
  -webkit-appearance:none;

  background:#020617;

  border:2px solid #1e293b;

  border-radius:18px;

  color:white;

  font-size:28px;

  font-weight:800;

  padding:0 18px;

}

.photo-btn{

  margin-top:16px;

  width:100%;

  height:54px;

  border:none;

  border-radius:18px;

  background:#1e293b;

  color:white;

  font-size:16px;

  font-weight:700;

}

.preview{

  margin-top:14px;

}

.preview img{

  width:100%;

  border-radius:20px;

  max-height:260px;

  object-fit:cover;

}

.status{

  margin-top:12px;

  color:var(--success);

  text-align:center;

  font-size:13px;

}

.bottom-bar{

  position:fixed;

  left:0;
  right:0;
  bottom:0;

  background:rgba(15,23,42,.95);

  border-top:1px solid var(--border);

  padding:
  14px
  16px
  calc(env(safe-area-inset-bottom) + 14px);

  display:flex;

  gap:12px;

  backdrop-filter:blur(20px);

}

.bottom-bar button{

  flex:1;

  height:58px;

  border:none;

  border-radius:20px;

  color:white;

  font-size:18px;

  font-weight:800;

}

.csv{
  background:#0284c7;
}

.pdf{
  background:#334155;
}

.clear{
  background:#dc2626;
}

.hidden{
  display:none;
}

</style>

</head>

<body>

<header>

<h1>Ponto Mobile</h1>

<p>
27/05/2026 até 09/06/2026
</p>

</header>

<div class="container">

<div class="day-navigation">

<button onclick="diaAnterior()">
◀
</button>

<div id="currentDate">
27/05/2026
</div>

<button onclick="proximoDia()">
▶
</button>

</div>

<div id="container"></div>

</div>

<div class="bottom-bar">

<button
class="csv"
onclick="exportarCSV()"
>
CSV
</button>

<button
class="pdf"
onclick="gerarPDF()"
>
PDF
</button>

<button
class="clear"
onclick="limparTudo()"
>
Limpar
</button>

</div>

<script>

const DIAS = [

"2026-05-27",
"2026-05-28",
"2026-05-29",

"2026-06-01",
"2026-06-02",
"2026-06-03",
"2026-06-05",

"2026-06-08",
"2026-06-09"

];

const CAMPOS = [

{
id:"entrada",
nome:"Entrada"
},

{
id:"saida",
nome:"Saída almoço"
},

{
id:"volta",
nome:"Volta almoço"
},

{
id:"fim",
nome:"Encerramento"
}

];

let indiceAtual = 0;

async function pedirPermissao(){

if(Notification.permission !== "granted"){

await Notification.requestPermission();

}

}

pedirPermissao();

function notificar(titulo,msg){

if(Notification.permission === "granted"){

new Notification(titulo,{

body:msg

});

}

}

function formatarData(data){

const [ano,mes,dia] = data.split("-");

return `${dia}/${mes}/${ano}`;

}

function chave(tipo,data){

return `ponto_${tipo}_${data}`;

}

function salvar(campo,data,valor){

localStorage.setItem(
chave(campo,data),
valor
);

mostrarStatus(data,campo);

notificar(
"Ponto salvo ✅",
`${campo} registrado`
);

if(campo === "saida"){

setTimeout(()=>{

notificar(
"Almoço ⏰",
"Faltam 10 minutos para voltar"
);

},50 * 60 * 1000);

setTimeout(()=>{

notificar(
"Almoço 🍽️",
"Hora de voltar"
);

},60 * 60 * 1000);

}

}

function mostrarStatus(data,campo){

const el = document.getElementById(
`status_${campo}_${data}`
);

el.innerText = "Salvo";

setTimeout(()=>{

el.innerText = "";

},1500);

}

function abrirCamera(id){

document.getElementById(id).click();

}

function salvarFoto(data,campo,input){

const file = input.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

localStorage.setItem(
chave(`foto_${campo}`,data),
e.target.result
);

document.getElementById(
`preview_${campo}_${data}`
).innerHTML =
`<img src="${e.target.result}" />`;

const jaTemHorario = localStorage.getItem(chave(campo,data));
if(!jaTemHorario){
const agora = new Date();
const hh = String(agora.getHours()).padStart(2,'0');
const mm = String(agora.getMinutes()).padStart(2,'0');
const horarioAtual = `${hh}:${mm}`;
const timeInput = document.getElementById(`time_${campo}_${data}`);
if(timeInput) timeInput.value = horarioAtual;
salvar(campo, data, horarioAtual);
} else {
mostrarStatus(data,campo);
}

};

reader.readAsDataURL(file);

}

function atualizarTimer(data){

const entrada =
localStorage.getItem(
chave("entrada",data)
);

if(!entrada){

document.getElementById(
`timer_${data}`
).innerText = "00:00:00";

document.getElementById(
`remaining_${data}`
).innerText =
"Faltam 08:00:00";

return;

}

const saida =
localStorage.getItem(
chave("saida",data)
);

const volta =
localStorage.getItem(
chave("volta",data)
);

const fim =
localStorage.getItem(
chave("fim",data)
);

const agora = new Date();

function parseHora(hora){

const [h,m] = hora.split(":");

return new Date(
`${data}T${h}:${m}:00`
);

}

let inicio =
parseHora(entrada);

let final =
fim
? parseHora(fim)
: agora;

let total =
final - inicio;

if(saida){

const inicioAlmoco =
parseHora(saida);

const fimAlmoco =
volta
? parseHora(volta)
: agora;

total -= (
fimAlmoco - inicioAlmoco
);

}

if(total < 0){

total = 0;

}

const horas =
Math.floor(total / 3600000);

const minutos =
Math.floor(
(total % 3600000)
/ 60000
);

const segundos =
Math.floor(
(total % 60000)
/ 1000
);

document.getElementById(
`timer_${data}`
).innerText =

`${String(horas).padStart(2,"0")}:${
String(minutos).padStart(2,"0")
}:${
String(segundos).padStart(2,"0")
}`;

const meta =
8 * 60 * 60 * 1000;

let restante =
meta - total;

if(restante < 0){

restante = 0;

}

const rh =
Math.floor(restante / 3600000);

const rm =
Math.floor(
(restante % 3600000)
/ 60000
);

const rs =
Math.floor(
(restante % 60000)
/ 1000
);

document.getElementById(
`remaining_${data}`
).innerText =

restante === 0

? "Jornada concluída ✅"

: `Faltam ${
String(rh).padStart(2,"0")
}:${
String(rm).padStart(2,"0")
}:${
String(rs).padStart(2,"0")
}`;

}

function renderDia(){

const data =
DIAS[indiceAtual];

document.getElementById(
"currentDate"
).innerText =
formatarData(data);

const container =
document.getElementById("container");

const card =
document.createElement("div");

card.className = "day-card";

let html = `

<div class="work-timer">

<div class="timer-title">
Jornada de trabalho
</div>

<div
class="timer-value"
id="timer_${data}"
>
00:00:00
</div>

<div
class="timer-remaining"
id="remaining_${data}"
>
Faltam 08:00:00
</div>

</div>

`;

CAMPOS.forEach(campo=>{

const valor =
localStorage.getItem(
chave(campo.id,data)
) || "";

const foto =
localStorage.getItem(
chave(`foto_${campo.id}`,data)
);

const inputId =
`file_${campo.id}_${data}`;

html += `

<div class="point-card">

<div class="point-label">
${campo.nome}
</div>

<input
id="time_${campo.id}_${data}"
class="time-input"
type="time"
value="${valor}"
onchange="
salvar(
'${campo.id}',
'${data}',
this.value
)
"
/>

<button
class="photo-btn"
onclick="
abrirCamera(
'${inputId}'
)
"
>

📸 Foto do ponto

</button>

<input
id="${inputId}"
class="hidden"
type="file"
accept="image/*"
capture="user"
onchange="
salvarFoto(
'${data}',
'${campo.id}',
this
)
"
/>

<div
class="preview"
id="preview_${campo.id}_${data}"
>

${foto ? `<img src="${foto}" />` : ""}

</div>

<div
class="status"
id="status_${campo.id}_${data}"
>
</div>

</div>

`;

});

card.innerHTML = html;

container.innerHTML = "";

container.appendChild(card);

atualizarTimer(data);

}

function proximoDia(){

if(indiceAtual < DIAS.length - 1){

indiceAtual++;

renderDia();

}

}

function diaAnterior(){

if(indiceAtual > 0){

indiceAtual--;

renderDia();

}

}

setInterval(()=>{

atualizarTimer(
DIAS[indiceAtual]
);

},1000);

function exportarCSV(){

let linhas = [];

linhas.push([
"Data",
"Entrada",
"Saida",
"Volta",
"Fim"
]);

DIAS.forEach(data=>{

linhas.push([

formatarData(data),

localStorage.getItem(
chave("entrada",data)
) || "",

localStorage.getItem(
chave("saida",data)
) || "",

localStorage.getItem(
chave("volta",data)
) || "",

localStorage.getItem(
chave("fim",data)
) || ""

]);

});

const csv = linhas
.map(l=>l.join(";"))
.join("\n");

const blob = new Blob(
[csv],
{
type:"text/csv"
}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;

a.download =
"ponto-mobile.csv";

a.click();

URL.revokeObjectURL(url);

}

function gerarPDF(){

let html = `

<html>

<head>

<title>Relatório</title>

<style>

body{
font-family:Arial;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

img{
width:80px;
height:80px;
object-fit:cover;
}

</style>

</head>

<body>

<h1>
Relatório de Ponto
</h1>

<table>

<thead>

<tr>

<th>Data</th>

<th>Entrada</th>
<th>Foto</th>

<th>Saída</th>
<th>Foto</th>

<th>Volta</th>
<th>Foto</th>

<th>Fim</th>
<th>Foto</th>

</tr>

</thead>

<tbody>

`;

DIAS.forEach(data=>{

html += `

<tr>

<td>
${formatarData(data)}
</td>

<td>
${localStorage.getItem(
chave("entrada",data)
) || "-"}
</td>

<td>
${
localStorage.getItem(
chave("foto_entrada",data)
)
?
`<img src="${
localStorage.getItem(
chave("foto_entrada",data)
)
}" />`
:
"-"
}
</td>

<td>
${localStorage.getItem(
chave("saida",data)
) || "-"}
</td>

<td>
${
localStorage.getItem(
chave("foto_saida",data)
)
?
`<img src="${
localStorage.getItem(
chave("foto_saida",data)
)
}" />`
:
"-"
}
</td>

<td>
${localStorage.getItem(
chave("volta",data)
) || "-"}
</td>

<td>
${
localStorage.getItem(
chave("foto_volta",data)
)
?
`<img src="${
localStorage.getItem(
chave("foto_volta",data)
)
}" />`
:
"-"
}
</td>

<td>
${localStorage.getItem(
chave("fim",data)
) || "-"}
</td>

<td>
${
localStorage.getItem(
chave("foto_fim",data)
)
?
`<img src="${
localStorage.getItem(
chave("foto_fim",data)
)
}" />`
:
"-"
}
</td>

</tr>

`;

});

html += `

</tbody>

</table>

</body>

</html>

`;

const janela =
window.open(
"",
"_blank"
);

janela.document.write(html);

janela.document.close();

setTimeout(()=>{

janela.print();

},500);

}

function limparTudo(){

const ok = confirm(
"Apagar tudo?"
);

if(!ok) return;

localStorage.clear();

renderDia();

}

renderDia();

</script>

</body>
</html>
