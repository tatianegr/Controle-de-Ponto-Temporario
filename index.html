<!-- ========================================= -->
<!-- ARQUIVO: index.html -->
<!-- ========================================= -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width,initial-scale=1,viewport-fit=cover"
/>

<title>Ponto Mobile</title>

<meta name="theme-color" content="#020617"/>

<link rel="manifest" href="manifest.json"/>

<link
rel="apple-touch-icon"
href="icon-192.png"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

:root{

  --bg:#020617;
  --card:#0f172a;
  --soft:#111827;

  --border:#1e293b;

  --primary:#38bdf8;

  --text:#f8fafc;
  --muted:#94a3b8;

  --success:#10b981;

}

body{

  background:var(--bg);

  color:var(--text);

  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "SF Pro Display",
  "Segoe UI",
  sans-serif;

  min-height:100vh;

  padding-bottom:120px;

}

header{

  position:sticky;
  top:0;
  z-index:999;

  background:rgba(2,6,23,.92);

  backdrop-filter:blur(18px);

  border-bottom:1px solid var(--border);

  padding:
  calc(env(safe-area-inset-top) + 18px)
  20px
  18px;

}

header h1{

  font-size:34px;

  font-weight:900;

  color:var(--primary);

}

header p{

  margin-top:8px;

  color:var(--muted);

  font-size:15px;

}

.install-btn{

  margin-top:16px;

  width:100%;

  height:54px;

  border:none;

  border-radius:18px;

  background:#10b981;

  color:white;

  font-size:16px;

  font-weight:800;

}

.container{

  width:100%;

  max-width:650px;

  margin:auto;

  padding:18px;

}

.day-card{

  background:var(--card);

  border:1px solid var(--border);

  border-radius:30px;

  padding:22px;

  margin-bottom:26px;

}

.day-title{

  font-size:34px;

  font-weight:900;

  color:var(--primary);

  margin-bottom:24px;

}

.point-card{

  background:var(--soft);

  border:1px solid var(--border);

  border-radius:24px;

  padding:18px;

  margin-bottom:18px;

}

.point-label{

  color:var(--muted);

  margin-bottom:12px;

  font-size:15px;

}

.time-input{

  width:100%;

  height:64px;

  appearance:none;
  -webkit-appearance:none;

  background:#020617;

  border:2px solid #1e293b;

  border-radius:18px;

  color:white;

  font-size:28px;

  font-weight:800;

  padding:0 18px;

}

.photo-btn{

  margin-top:16px;

  width:100%;

  height:54px;

  border:none;

  border-radius:18px;

  background:#1e293b;

  color:white;

  font-size:16px;

  font-weight:700;

}

.preview{

  margin-top:14px;

}

.preview img{

  width:100%;

  border-radius:20px;

  max-height:260px;

  object-fit:cover;

}

.status{

  margin-top:12px;

  color:var(--success);

  text-align:center;

  font-size:13px;

}

.bottom-bar{

  position:fixed;

  left:0;
  right:0;
  bottom:0;

  background:rgba(15,23,42,.95);

  border-top:1px solid var(--border);

  padding:
  14px
  16px
  calc(env(safe-area-inset-bottom) + 14px);

  display:flex;

  gap:12px;

  backdrop-filter:blur(20px);

}

.bottom-bar button{

  flex:1;

  height:58px;

  border:none;

  border-radius:20px;

  color:white;

  font-size:18px;

  font-weight:800;

}

.csv{
  background:#0284c7;
}

.pdf{
  background:#334155;
}

.clear{
  background:#dc2626;
}

.hidden{
  display:none;
}

</style>

</head>

<body>

<header>

<h1>Ponto Mobile</h1>

<p>
27/05/2026 até 09/06/2026
</p>

<button
id="installButton"
class="install-btn hidden"
>
Instalar App
</button>

</header>

<div
class="container"
id="container"
></div>

<div class="bottom-bar">

<button
class="csv"
onclick="exportarCSV()"
>
CSV
</button>

<button
class="pdf"
onclick="window.print()"
>
PDF
</button>

<button
class="clear"
onclick="limparTudo()"
>
Limpar
</button>

</div>

<script>

/* ====================================== */
/* PWA */
/* ====================================== */

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"./service-worker.js"
);

}

/* ====================================== */
/* INSTALAR APP */
/* ====================================== */

let deferredPrompt;

window.addEventListener(
"beforeinstallprompt",
(e)=>{

e.preventDefault();

deferredPrompt = e;

document
.getElementById("installButton")
.classList.remove("hidden");

}
);

document
.getElementById("installButton")
.addEventListener("click",async()=>{

if(!deferredPrompt) return;

deferredPrompt.prompt();

});

/* ====================================== */
/* NOTIFICAÇÕES */
/* ====================================== */

async function pedirPermissao(){

if(Notification.permission !== "granted"){

await Notification.requestPermission();

}

}

pedirPermissao();

function notificar(titulo,msg){

if(Notification.permission === "granted"){

new Notification(titulo,{

body:msg,
icon:"icon-192.png"

});

}

}

/* ====================================== */
/* DIAS */
/* ====================================== */

const DIAS = [

"2026-05-27",
"2026-05-28",
"2026-05-29",

"2026-06-01",
"2026-06-02",
"2026-06-03",
"2026-06-04",
"2026-06-05",

"2026-06-08",
"2026-06-09"

];

const CAMPOS = [

{
id:"entrada",
nome:"Entrada"
},

{
id:"saida",
nome:"Saída almoço"
},

{
id:"volta",
nome:"Volta almoço"
},

{
id:"fim",
nome:"Encerramento"
}

];

function formatarData(data){

const [ano,mes,dia] = data.split("-");

return `${dia}/${mes}/${ano}`;

}

function chave(tipo,data){

return `ponto_${tipo}_${data}`;

}

/* ====================================== */
/* SALVAR HORÁRIO */
/* ====================================== */

function salvar(campo,data,valor){

localStorage.setItem(
chave(campo,data),
valor
);

mostrarStatus(data,campo);

notificar(
"Ponto salvo ✅",
`${campo} registrado`
);

/* ============================== */
/* ALERTA ALMOÇO */
/* ============================== */

if(campo === "saida"){

setTimeout(()=>{

notificar(
"Almoço ⏰",
"Faltam 10 minutos para voltar"
);

},50 * 60 * 1000);

setTimeout(()=>{

notificar(
"Almoço 🍽️",
"Hora de voltar"
);

},60 * 60 * 1000);

}

}

/* ====================================== */
/* STATUS */
/* ====================================== */

function mostrarStatus(data,campo){

const el = document.getElementById(
`status_${campo}_${data}`
);

el.innerText = "Salvo";

setTimeout(()=>{

el.innerText = "";

},1500);

}

/* ====================================== */
/* FOTO */
/* ====================================== */

function abrirCamera(id){

document.getElementById(id).click();

}

function salvarFoto(data,campo,input){

const file = input.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

localStorage.setItem(
chave(`foto_${campo}`,data),
e.target.result
);

document.getElementById(
`preview_${campo}_${data}`
).innerHTML =
`<img src="${e.target.result}" />`;

mostrarStatus(data,campo);

notificar(
"Foto salva 📸",
`${campo} atualizado`
);

};

reader.readAsDataURL(file);

}

/* ====================================== */
/* RENDER */
/* ====================================== */

function carregar(){

const container =
document.getElementById("container");

container.innerHTML = "";

DIAS.forEach(data=>{

const card =
document.createElement("div");

card.className = "day-card";

let html = `

<div class="day-title">
${formatarData(data)}
</div>

`;

CAMPOS.forEach(campo=>{

const valor =
localStorage.getItem(
chave(campo.id,data)
) || "";

const foto =
localStorage.getItem(
chave(`foto_${campo.id}`,data)
);

const inputId =
`file_${campo.id}_${data}`;

html += `

<div class="point-card">

<div class="point-label">
${campo.nome}
</div>

<input
class="time-input"
type="time"
value="${valor}"
onchange="
salvar(
'${campo.id}',
'${data}',
this.value
)
"
/>

<button
class="photo-btn"
onclick="
abrirCamera(
'${inputId}'
)
"
>

📸 Foto do ponto

</button>

<input
id="${inputId}"
class="hidden"
type="file"
accept="image/*"
capture="environment"
onchange="
salvarFoto(
'${data}',
'${campo.id}',
this
)
"
/>

<div
class="preview"
id="preview_${campo.id}_${data}"
>

${foto ? `<img src="${foto}" />` : ""}

</div>

<div
class="status"
id="status_${campo.id}_${data}"
>
</div>

</div>

`;

});

card.innerHTML = html;

container.appendChild(card);

});

}

/* ====================================== */
/* CSV */
/* ====================================== */

function exportarCSV(){

let linhas = [];

linhas.push([
"Data",
"Entrada",
"Saida",
"Volta",
"Fim"
]);

DIAS.forEach(data=>{

linhas.push([

formatarData(data),

localStorage.getItem(
chave("entrada",data)
) || "",

localStorage.getItem(
chave("saida",data)
) || "",

localStorage.getItem(
chave("volta",data)
) || "",

localStorage.getItem(
chave("fim",data)
) || ""

]);

});

const csv = linhas
.map(l=>l.join(";"))
.join("\n");

const blob = new Blob(
[csv],
{
type:"text/csv"
}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;

a.download =
"ponto-mobile.csv";

a.click();

URL.revokeObjectURL(url);

}

/* ====================================== */
/* LIMPAR */
/* ====================================== */

function limparTudo(){

const ok = confirm(
"Apagar tudo?"
);

if(!ok) return;

localStorage.clear();

carregar();

}

carregar();

</script>

</body>
</html>
