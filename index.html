<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Ponto Mobile</title>

<meta name="theme-color" content="#0f172a"/>

<link rel="manifest" href="manifest.json">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:#020617;
  color:#f8fafc;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  min-height:100vh;
}

header{
  padding:22px 20px;
  background:rgba(15,23,42,.95);
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid #1e293b;
  backdrop-filter:blur(10px);
}

header h1{
  font-size:24px;
  font-weight:700;
  color:#38bdf8;
}

header p{
  margin-top:5px;
  color:#94a3b8;
  font-size:14px;
}

.container{
  padding:18px;
  padding-bottom:120px;
}

.card{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:22px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.date{
  font-size:18px;
  font-weight:700;
  margin-bottom:18px;
  color:#38bdf8;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.box{
  background:#111827;
  border:1px solid #1e293b;
  border-radius:18px;
  padding:14px;
}

.box label{
  display:block;
  margin-bottom:8px;
  font-size:13px;
  color:#94a3b8;
}

.box input[type="time"]{
  width:100%;
  background:#020617;
  border:1px solid #334155;
  border-radius:14px;
  color:white;
  padding:14px;
  font-size:18px;
}

.photo-area{
  margin-top:16px;
  background:#111827;
  border:2px dashed #334155;
  border-radius:18px;
  padding:18px;
  text-align:center;
}

.photo-area input{
  margin-top:12px;
  width:100%;
}

.preview img{
  width:100%;
  max-height:220px;
  object-fit:cover;
  border-radius:18px;
  margin-top:14px;
}

.actions{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#0f172a;
  border-top:1px solid #1e293b;
  padding:14px;
  display:flex;
  gap:10px;
}

button{
  flex:1;
  border:none;
  border-radius:18px;
  padding:16px;
  font-size:15px;
  font-weight:700;
  color:white;
}

.primary{
  background:#0284c7;
}

.secondary{
  background:#334155;
}

.danger{
  background:#dc2626;
}

button:active{
  transform:scale(.98);
}

.status{
  margin-top:8px;
  color:#10b981;
  font-size:13px;
}

.install{
  margin-top:12px;
  display:none;
}

.install button{
  width:100%;
  background:#10b981;
}

@media(min-width:900px){

  .container{
    max-width:700px;
    margin:auto;
  }

}

</style>
</head>

<body>

<header>

<h1>Ponto Mobile</h1>

<p>
27/05/2026 até 09/06/2026
</p>

<div class="install" id="installBox">

<button onclick="instalarApp()">
Instalar App
</button>

</div>

</header>

<div class="container" id="container"></div>

<div class="actions">

<button class="primary" onclick="exportarCSV()">
CSV
</button>

<button class="secondary" onclick="window.print()">
PDF
</button>

<button class="danger" onclick="limparTudo()">
Limpar
</button>

</div>

<script>

const DIAS = [
"2026-05-27",
"2026-05-28",
"2026-05-29",
"2026-06-01",
"2026-06-02",
"2026-06-03",
"2026-06-04",
"2026-06-05",
"2026-06-08",
"2026-06-09"
];

const CAMPOS = [
{
id:"entrada",
nome:"Entrada"
},
{
id:"saida",
nome:"Saída almoço"
},
{
id:"volta",
nome:"Volta almoço"
},
{
id:"fim",
nome:"Encerramento"
}
];

function formatarData(dataISO){

const [ano, mes, dia] = dataISO.split("-");

return `${dia}/${mes}/${ano}`;

}

function chave(tipo, data){

return `ponto_${tipo}_${data}`;

}

function salvar(campo, data, valor){

localStorage.setItem(
chave(campo,data),
valor
);

mostrarStatus(data);

}

function mostrarStatus(data){

const el = document.getElementById(
`status_${data}`
);

el.innerText = "Salvo automaticamente";

setTimeout(()=>{

el.innerText = "";

},2000);

}

function salvarFoto(data,input){

const file = input.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

localStorage.setItem(
chave("foto",data),
e.target.result
);

document.getElementById(
`preview_${data}`
).innerHTML =
`<img src="${e.target.result}" />`;

mostrarStatus(data);

};

reader.readAsDataURL(file);

}

function carregar(){

const container =
document.getElementById("container");

container.innerHTML = "";

DIAS.forEach(data=>{

const card =
document.createElement("div");

card.className = "card";

let html = `
<div class="date">
${formatarData(data)}
</div>

<div class="grid">
`;

CAMPOS.forEach(campo=>{

const valor =
localStorage.getItem(
chave(campo.id,data)
) || "";

html += `
<div class="box">

<label>
${campo.nome}
</label>

<input
type="time"
value="${valor}"
onchange="
salvar(
'${campo.id}',
'${data}',
this.value
)
"
/>

</div>
`;

});

html += `
</div>

<div class="photo-area">

<div>
Foto do ponto
</div>

<input
type="file"
accept="image/*"
capture="environment"
onchange="
salvarFoto(
'${data}',
this
)
"
/>

<div
class="preview"
id="preview_${data}"
>
${
localStorage.getItem(
chave("foto",data)
)
?
`<img src="${
localStorage.getItem(
chave("foto",data)
)
}" />`
:
""
}
</div>

<div
class="status"
id="status_${data}"
>
</div>

</div>
`;

card.innerHTML = html;

container.appendChild(card);

});

}

function exportarCSV(){

let linhas = [];

linhas.push([
"Data",
"Entrada",
"Saida",
"Volta",
"Fim"
]);

DIAS.forEach(data=>{

linhas.push([

formatarData(data),

localStorage.getItem(
chave("entrada",data)
) || "",

localStorage.getItem(
chave("saida",data)
) || "",

localStorage.getItem(
chave("volta",data)
) || "",

localStorage.getItem(
chave("fim",data)
) || ""

]);

});

const csv = linhas
.map(l=>l.join(";"))
.join("\n");

const blob = new Blob(
[csv],
{
type:"text/csv"
}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;

a.download =
"ponto-mobile.csv";

a.click();

URL.revokeObjectURL(url);

}

function limparTudo(){

const ok = confirm(
"Apagar todos os dados?"
);

if(!ok) return;

localStorage.clear();

carregar();

}

let deferredPrompt;

window.addEventListener(
"beforeinstallprompt",
(e)=>{

e.preventDefault();

deferredPrompt = e;

document.getElementById(
"installBox"
).style.display = "block";

}
);

async function instalarApp(){

if(!deferredPrompt) return;

deferredPrompt.prompt();

const result =
await deferredPrompt.userChoice;

if(result.outcome === "accepted"){

document.getElementById(
"installBox"
).style.display = "none";

}

}

carregar();

</script>

</body>
</html>
