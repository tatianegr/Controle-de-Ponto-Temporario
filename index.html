<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>Ponto Mobile</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:#020617;
  color:#f8fafc;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  min-height:100vh;
  padding-bottom:120px;
}

header{
  position:sticky;
  top:0;
  z-index:999;
  background:rgba(2,6,23,.96);
  backdrop-filter:blur(12px);
  border-bottom:1px solid #1e293b;
  padding:24px 20px;
}

header h1{
  color:#38bdf8;
  font-size:30px;
  font-weight:800;
}

header p{
  margin-top:6px;
  color:#94a3b8;
  font-size:15px;
}

.container{
  padding:18px;
}

.card{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:28px;
  padding:22px;
  margin-bottom:24px;
  box-shadow:0 20px 40px rgba(0,0,0,.45);
}

.date{
  color:#38bdf8;
  font-size:30px;
  font-weight:800;
  margin-bottom:22px;
}

.time-grid{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.time-card{
  background:#111827;
  border:1px solid #1e293b;
  border-radius:24px;
  padding:18px;
}

.time-card label{
  display:block;
  color:#94a3b8;
  margin-bottom:12px;
  font-size:15px;
}

.time-card input[type="time"]{
  width:100%;
  height:65px;
  border:none;
  border-radius:18px;
  background:#020617;
  color:white;
  padding:0 18px;
  font-size:28px;
  font-weight:700;
  outline:none;
  border:2px solid #1e293b;
}

.photo-box{
  margin-top:16px;
  border:2px dashed #334155;
  border-radius:20px;
  padding:18px;
  text-align:center;
  background:#0b1220;
}

.photo-box small{
  display:block;
  margin-bottom:12px;
  color:#94a3b8;
  font-size:13px;
}

.photo-box input{
  width:100%;
  color:#cbd5e1;
}

.preview{
  margin-top:14px;
}

.preview img{
  width:100%;
  border-radius:18px;
  max-height:240px;
  object-fit:cover;
  border:2px solid #1e293b;
}

.status{
  margin-top:10px;
  color:#10b981;
  font-size:13px;
}

.actions{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(15,23,42,.98);
  border-top:1px solid #1e293b;
  padding:14px;
  display:flex;
  gap:12px;
  backdrop-filter:blur(12px);
}

button{
  flex:1;
  height:58px;
  border:none;
  border-radius:20px;
  color:white;
  font-size:18px;
  font-weight:800;
}

.csv{
  background:#0284c7;
}

.pdf{
  background:#334155;
}

.clear{
  background:#dc2626;
}

button:active{
  transform:scale(.97);
}

@media(min-width:900px){

  .container{
    max-width:700px;
    margin:auto;
  }

}

</style>

</head>

<body>

<header>

<h1>Ponto Mobile</h1>

<p>
27/05/2026 até 09/06/2026
</p>

</header>

<div class="container" id="container"></div>

<div class="actions">

<button class="csv" onclick="exportarCSV()">
CSV
</button>

<button class="pdf" onclick="window.print()">
PDF
</button>

<button class="clear" onclick="limparTudo()">
Limpar
</button>

</div>

<script>

const DIAS = [
"2026-05-27",
"2026-05-28",
"2026-05-29",
"2026-06-01",
"2026-06-02",
"2026-06-03",
"2026-06-04",
"2026-06-05",
"2026-06-08",
"2026-06-09"
];

const CAMPOS = [

{
id:"entrada",
nome:"Entrada"
},

{
id:"saida",
nome:"Saída almoço"
},

{
id:"volta",
nome:"Volta almoço"
},

{
id:"fim",
nome:"Encerramento"
}

];

function formatarData(data){

const [ano, mes, dia] = data.split("-");

return `${dia}/${mes}/${ano}`;

}

function chave(tipo,data){

return `ponto_${tipo}_${data}`;

}

function salvar(campo,data,valor){

localStorage.setItem(
chave(campo,data),
valor
);

mostrarStatus(data,campo);

}

function mostrarStatus(data,campo){

const el = document.getElementById(
`status_${campo}_${data}`
);

el.innerText = "Salvo";

setTimeout(()=>{

el.innerText = "";

},1500);

}

function salvarFoto(data,campo,input){

const file = input.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

localStorage.setItem(
chave(`foto_${campo}`,data),
e.target.result
);

document.getElementById(
`preview_${campo}_${data}`
).innerHTML =
`<img src="${e.target.result}" />`;

mostrarStatus(data,campo);

};

reader.readAsDataURL(file);

}

function carregar(){

const container =
document.getElementById("container");

container.innerHTML = "";

DIAS.forEach(data=>{

const card =
document.createElement("div");

card.className = "card";

let html = `
<div class="date">
${formatarData(data)}
</div>

<div class="time-grid">
`;

CAMPOS.forEach(campo=>{

const valor =
localStorage.getItem(
chave(campo.id,data)
) || "";

const foto =
localStorage.getItem(
chave(`foto_${campo.id}`,data)
);

html += `

<div class="time-card">

<label>
${campo.nome}
</label>

<input
type="time"
value="${valor}"
onchange="
salvar(
'${campo.id}',
'${data}',
this.value
)
"
/>

<div class="photo-box">

<small>
Foto do ${campo.nome.toLowerCase()}
</small>

<input
type="file"
accept="image/*"
capture="environment"
onchange="
salvarFoto(
'${data}',
'${campo.id}',
this
)
"
/>

<div
class="preview"
id="preview_${campo.id}_${data}"
>
${foto ? `<img src="${foto}" />` : ""}
</div>

<div
class="status"
id="status_${campo.id}_${data}"
>
</div>

</div>

</div>
`;

});

html += `</div>`;

card.innerHTML = html;

container.appendChild(card);

});

}

function exportarCSV(){

let linhas = [];

linhas.push([
"Data",
"Entrada",
"Saida",
"Volta",
"Fim"
]);

DIAS.forEach(data=>{

linhas.push([

formatarData(data),

localStorage.getItem(
chave("entrada",data)
) || "",

localStorage.getItem(
chave("saida",data)
) || "",

localStorage.getItem(
chave("volta",data)
) || "",

localStorage.getItem(
chave("fim",data)
) || ""

]);

});

const csv = linhas
.map(l=>l.join(";"))
.join("\n");

const blob = new Blob(
[csv],
{
type:"text/csv"
}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;

a.download =
"ponto-mobile.csv";

a.click();

URL.revokeObjectURL(url);

}

function limparTudo(){

const ok = confirm(
"Deseja apagar tudo?"
);

if(!ok) return;

localStorage.clear();

carregar();

}

carregar();

</script>

</body>
</html>
